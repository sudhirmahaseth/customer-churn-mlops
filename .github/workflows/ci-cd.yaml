name: Customer Churn MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn xgboost mlflow dvc fastapi uvicorn pytest pytest-asyncio httpx

    - name: Run Code Tests
      run: |
        python -m pytest

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🎯 असली बदलाव: डमी स्टेप को हटा दिया गया है और Docker Build में Secrets पास किए गए हैं
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        build-args: |
          DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-app:${{ github.sha }}