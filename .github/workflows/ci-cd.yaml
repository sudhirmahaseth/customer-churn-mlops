name: Customer Churn MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # ✅ 'testclient' हटाकर फिक्स कर दिया गया है
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn xgboost mlflow dvc fastapi uvicorn pytest pytest-asyncio httpx

    - name: Run Code Tests
      run: |
        python -m pytest

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # ✅ पायथन/पैंडाज निर्भरता को हटाकर सीधे Bash से डमी फाइल्स जनरेट करना (फ़ास्ट और एरर-फ़्री)
    - name: Create Valid Dummy Artifacts for Docker Build
      run: |
        mkdir -p artifacts models
        echo "gender,SeniorCitizen,Partner,Dependents,tenure,PhoneService,MultipleLines,InternetService,OnlineSecurity,OnlineBackup,DeviceProtection,TechSupport,StreamingTV,StreamingMovies,Contract,PaperlessBilling,PaymentMethod,MonthlyCharges,TotalCharges,charges_per_tenure,Churn" > artifacts/train.csv
        echo "dummy model content" > models/model.pkl

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-app:${{ github.sha }}