name: Customer Churn MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio fastapi testclient

    - name: Run Code Tests
      run: |
        python -m pytest

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔑 Docker Hub पर लॉग-इन करना
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🎯 डॉकर बिल्ड के लिए वर्किंग डमी मॉडल और आर्टिफैक्ट्स जनरेट करना (ताकि लाइव ऐप क्रैश न हो)
    - name: Create Valid Dummy Artifacts for Docker Build
      run: |
        mkdir -p artifacts models
        # 1. डमी train.csv ढांचा तैयार करना
        python -c "import pandas as pd; pd.DataFrame(columns=['gender', 'SeniorCitizen', 'Partner', 'Dependents', 'tenure', 'PhoneService', 'MultipleLines', 'InternetService', 'OnlineSecurity', 'OnlineBackup', 'DeviceProtection', 'TechSupport', 'StreamingTV', 'StreamingMovies', 'Contract', 'PaperlessBilling', 'PaymentMethod', 'MonthlyCharges', 'TotalCharges', 'charges_per_tenure', 'Churn']).to_csv('artifacts/train.csv', index=False)"
        # 2. एक डमी मॉडल क्लास बनाकर उसका .pkl सेव करना जिसमें predict मेथड हो
        python -c "import pickle; 
        class DummyModel:
            def predict(self, df): return [1]
        pickle.dump(DummyModel(), open('models/model.pkl', 'wb'))"

    # 🐳 डॉकर इमेज बिल्ड करना और Docker Hub पर पुश करना
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-app:${{ github.sha }}